      if (!progTxt || !progBar) return;
      const inputs = card.querySelectorAll('input[type="checkbox"]');
      let tot = inputs.length, don = 0;
      inputs.forEach(inp => { if (getCb(inp.dataset.cbid)) don++; });
      progTxt.textContent = `${don}/${tot}`;
      progBar.style.width = tot > 0 ? `${Math.round(don/tot*100)}%` : '0%';
      if (donePill) donePill.style.display = (don === tot && tot > 0) ? '' : 'none';
    });
  }

  function updateChecklistCounters() {
    document.querySelectorAll('[id^="clcount_"]').forEach(el => {
      const sid = el.id.replace('clcount_', '');
      const sec = findSection(sid);
      if (!sec) return;
      const t = countRawCbs(sec.raw);
      const d = countChecked(sid, t);
      el.textContent = `${d}/${t}`;
    });
  }

  function findSection(id) {
    for (const m of parsed.modules) {
      const s = m.sections.find(s => s.id === id);
      if (s) return s;
    }
    return null;
  }

  function resetAll() {
    if (!confirm('Reset all checklist progress? This cannot be undone.')) return;
    cbState = {};
    saveCb();
    goTab(state.tab);
    recalcProgress();
  }

  // ── INIT ──────────────────────────────────────────────────
  async function init() {
    loadCb();

    // Bind tab buttons
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => goTab(btn.dataset.tab));
    });

    // Bind filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter, btn.dataset.value));
    });

    // Load markdown
    let mdText;
    try {
      const resp = await fetch('./first-party-data-framework.md', { cache: 'no-store' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      mdText = await resp.text();
    } catch (err) {
      document.getElementById('loading').innerHTML = `
        <div class="loading-box">
          <p style="color:#F87171;font-size:14px">⚠ Could not load framework file.</p>
          <p class="error-msg" style="margin-top:8px">Serve this HTML from the same directory as<br><code style="color:#94A3B8">first-party-data-framework.md</code></p>
          <p class="error-msg">${err.message}</p>
        </div>`;
      return;
    }

    // Parse
    parsed = parseDocument(mdText);
    buildSearchIndex();
    initSearch();

    // Show app
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    // Initial render
    goTab('learn');
  }

  // ── SEARCH ────────────────────────────────────────────────
  let searchIdx = [];
  let searchFocusIdx = -1;

  function stripMd(raw) {
    return raw
      .replace(/<!--[\s\S]*?-->/g, '')
      .replace(/#{1,6}\s+/g, '')
      .replace(/\*{1,3}([^*]+)\*{1,3}/g, '$1')
      .replace(/`[^`]+`/g, '')
      .replace(/\|[^\n]+/g, ' ')
      .replace(/[-*+]\s+\[[ x]\]\s*/g, '')
      .replace(/[-*+]\s+/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/\s+/g, ' ').trim().slice(0, 300);
  }

  function buildSearchIndex() {
    searchIdx = [];
    parsed.modules.forEach(m => {
      m.sections.forEach(s => {
        const body = stripMd(s.raw);
        const base = { moduleId: m.id, sectionId: s.id, platform: m.track || null, body, moduleName: m.title };
        searchIdx.push({ ...base, tab: 'learn', tabLabel: 'Learn', title: sectionTitle(s.id) });
        if (s.quick_reference) searchIdx.push({ ...base, tab: 'quickref', tabLabel: 'Quick Ref', title: sectionTitle(s.id) });
        if (s.checklist && !s.apex) searchIdx.push({ ...base, tab: 'checklists', tabLabel: 'Checklist', title: sectionTitle(s.id) });
      });
    });
    // Add glossary terms
    VOCAB.forEach(v => {
      searchIdx.push({
        tab: 'glossary', tabLabel: 'Glossary',
        title: v.term + (v.abbr ? ` (${v.abbr})` : ''),
        body: v.def,
        platform: v.platform === 'both' ? null : v.platform,
        moduleName: v.cat,
        moduleId: null, sectionId: null,
        _glossaryTerm: v.term
      });
    });
  }

  function highlight(text, query) {
    if (!query) return text;
    const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
  }

  function runSearch(query) {
    const dd = document.getElementById('search-dropdown');
    const clr = document.getElementById('search-clear');
    clr.classList.toggle('visible', query.length > 0);
    if (query.length < 2) { dd.classList.remove('open'); return; }

    const q = query.toLowerCase();
    const hits = searchIdx.filter(e =>
      e.title.toLowerCase().includes(q) || e.body.toLowerCase().includes(q)
    ).slice(0, 8);

    searchFocusIdx = -1;
    if (!hits.length) {
      dd.innerHTML = `<div class="search-no-results">No results for "<strong>${query}</strong>"</div>`;
    } else {
      const iconClass = { learn: 'sri-learn', quickref: 'sri-quickref', checklists: 'sri-checklists', glossary: 'sri-learn' };
      const iconChar  = { learn: '📖', quickref: '📋', checklists: '✓', glossary: '🔤' };
      const platBadge = e => e.platform === 'google'
        ? '<span class="tag tag-google" style="font-size:9px;padding:1px 5px">Google</span>'
        : e.platform === 'meta'
        ? '<span class="tag tag-meta" style="font-size:9px;padding:1px 5px">Meta</span>'
        : '';

      const items = hits.map((e, i) => {
        const snippet = (() => {
          const idx = e.body.toLowerCase().indexOf(q);
          const start = Math.max(0, idx - 40);
          const raw = (start > 0 ? '…' : '') + e.body.slice(start, start + 120) + (start + 120 < e.body.length ? '…' : '');
          return highlight(raw, query);
        })();
        return `
          <div class="search-result" data-idx="${i}" onclick="FPD.searchNav(${i})">
            <div class="search-result-icon ${iconClass[e.tab]}">${iconChar[e.tab]}</div>
            <div class="search-result-body">
              <div class="search-result-title">${highlight(e.title, query)}</div>
              <div class="search-result-meta">
                <span class="search-result-crumb">${e.tabLabel} › ${e.moduleName}</span>
                ${platBadge(e)}
              </div>
              ${snippet ? `<div class="search-result-snippet">${snippet}</div>` : ''}
            </div>
          </div>`;
      }).join('');
      dd.innerHTML = items + `
        <div class="search-footer">
          <span class="search-footer-hint"><kbd class="search-kbd">↑↓</kbd> navigate</span>
          <span class="search-footer-hint"><kbd class="search-kbd">↵</kbd> open</span>
          <span class="search-footer-hint"><kbd class="search-kbd">Esc</kbd> close</span>
        </div>`;
    }
    dd.classList.add('open');
  }

  function searchNav(idx) {
    const e = searchIdx.filter(x => {
      const q = document.getElementById('search-input').value.toLowerCase();
      return x.title.toLowerCase().includes(q) || x.body.toLowerCase().includes(q);
    })[idx];
    if (!e) return;
    closeSearch();
    if (e.tab === 'learn') {
      goTab('learn'); goModule(e.moduleId);
      setTimeout(() => document.getElementById(`sec-${e.sectionId}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
    } else if (e.tab === 'quickref') {
      goTab('quickref');
      setTimeout(() => { filterQR(e.moduleId); document.getElementById(`qrg-${e.moduleId}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 120);
    } else if (e.tab === 'checklists') {
      goTab('checklists');
      setTimeout(() => document.getElementById(`clg-${e.moduleId}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
    } else if (e.tab === 'glossary') {
      const letter = e._glossaryTerm ? e._glossaryTerm[0].toUpperCase() : null;
      goTab('glossary');
      setTimeout(() => document.getElementById(`gl-${letter}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
    }
  }

  function closeSearch() {
    document.getElementById('search-dropdown').classList.remove('open');
    document.getElementById('search-input').blur();
  }

  function clearSearch() {
    const inp = document.getElementById('search-input');
    inp.value = '';
    document.getElementById('search-clear').classList.remove('visible');
    document.getElementById('search-dropdown').classList.remove('open');
    inp.focus();
  }

  function initSearch() {
    const inp = document.getElementById('search-input');
    inp.addEventListener('input', e => runSearch(e.target.value.trim()));
    inp.addEventListener('keydown', e => {
      const dd = document.getElementById('search-dropdown');
      const items = dd.querySelectorAll('.search-result');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchFocusIdx = Math.min(searchFocusIdx + 1, items.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchFocusIdx = Math.max(searchFocusIdx - 1, 0);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (searchFocusIdx >= 0) searchNav(searchFocusIdx);
        else if (items.length) searchNav(0);
        return;
      } else if (e.key === 'Escape') {
        closeSearch(); return;
      } else { return; }
      items.forEach((el, i) => el.classList.toggle('focused', i === searchFocusIdx));
    });
    document.addEventListener('click', e => {
      if (!document.getElementById('search-wrap').contains(e.target)) closeSearch();
    });
  }

  // ── GLOSSARY ──────────────────────────────────────────────
  const VOCAB = [
    { term: 'Advantage+', abbr: 'ASC', platform: 'meta', cat: 'Campaigns', def: 'Meta\'s AI-driven campaign type that automates audience, creative, and placement decisions. Advantage+ Shopping Campaigns (ASC) saw 70% YoY growth in Q4 2025 and are the primary replacement for manual Shopping campaigns. First-party data is the key input signal.' },
    { term: 'Advantage+ Audience', platform: 'meta', cat: 'Targeting', def: 'Meta\'s algorithmic audience expansion that replaces manual Lookalike Audience strategy. Instead of you defining seed audiences, Meta\'s AI expands reach based on pixel signals and first-party data. In most cases outperforms manual LALs in 2025.' },
    { term: 'AI Max', platform: 'google', cat: 'Campaigns', def: 'Google\'s AI-powered search campaign feature enabling broad keyword matching with brand controls. Feeds on first-party data via Customer Match signals and enables Customer Lifecycle Optimization (CLO) together with Data Manager.' },
    { term: 'ATT', abbr: 'App Tracking Transparency', platform: 'both', cat: 'Privacy', def: 'Apple\'s iOS 14.5+ framework requiring explicit user opt-in before apps can track across other apps and websites. Opt-in rates hover at 25–35%, making 65%+ of iOS users invisible to ad platforms. Drove the shift to first-party data strategies.' },
    { term: 'Attribution', platform: 'both', cat: 'Measurement', def: 'The process of assigning credit for a conversion to one or more ad touchpoints. Traditional last-click attribution is increasingly unreliable due to signal loss. First-party data improves attribution accuracy by providing deterministic identity signals.' },
    { term: 'Audience Expansion', platform: 'google', cat: 'Targeting', def: 'Google\'s automatic reach extension for Video and Display campaigns. Replaces Similar Audiences (removed August 2023) for these formats. The algorithm finds users similar to your seed audience based on behaviour and content signals.' },
    { term: 'BOFU', abbr: 'Bottom of Funnel', platform: 'both', cat: 'Strategy', def: 'The conversion stage of the customer journey — purchase, sign-up, or qualified lead. First-party data is most impactful at BOFU through suppression lists, Customer Match for remarketing, and value-based bidding using CRM signals.' },
    { term: 'CAPI', abbr: 'Conversions API', platform: 'meta', cat: 'Tracking', def: 'Meta\'s server-side event tracking system that sends conversion data directly from your server to Meta, bypassing browser-based limitations. CAPI v2 (July 2025) added enhanced event matching. Hybrid Pixel + CAPI setup delivers 13–20% CPA improvement over Pixel-only.' },
    { term: 'CLV', abbr: 'Customer Lifetime Value', platform: 'both', cat: 'Data', def: 'The total predicted revenue from a customer over their entire relationship with your business. Used in LTV-based bidding (Google) and Conversion Leads optimization (Meta) to shift spend toward highest-value customer acquisition.' },
    { term: 'CLO', abbr: 'Customer Lifecycle Optimization', platform: 'google', cat: 'Campaigns', def: 'Google\'s AI suite in Data Manager (2025) combining Lifecycle Segmentation and Predictive Audiences. Enables automated lifecycle-based targeting across New Customer Acquisition, retention, and win-back without manual audience uploads.' },
    { term: 'Consent Mode v2', abbr: 'CM v2', platform: 'google', cat: 'Privacy', def: 'Google\'s framework for handling user consent signals in the EEA. Advanced mode sends cookieless pings and allows Google to model conversions for users who decline. From July 21, 2025, sites without CM v2 are blocked from data collection for EEA users. Required for Customer Match effectiveness.' },
    { term: 'Conversion Leads', platform: 'meta', cat: 'Campaigns', def: 'Meta\'s optimization mode that feeds CRM quality signals (SQL, closed-won) back to Meta\'s algorithm via CAPI. Requires the 15–16 digit Meta Lead ID in your CRM. Delivers up to 15% lower cost-per-quality-lead by teaching Meta to find leads that convert downstream.' },
    { term: 'Conversion Value Rules', platform: 'google', cat: 'Bidding', def: 'Google Ads rules that adjust the reported conversion value based on audience membership, location, or device. Used to implement LTV-based bidding: e.g., multiply conversion value ×3 for High LTV Customer Match lists so Smart Bidding bids more aggressively for high-value prospects.' },
    { term: 'CRM', abbr: 'Customer Relationship Management', platform: 'both', cat: 'Data', def: 'A system storing customer contact data, purchase history, and lifecycle stage. The primary source of first-party data for audience uploads. Minimum viable CRM schema for ad platforms: email + phone + first/last name per contact. Match rate depends directly on CRM data quality.' },
    { term: 'Custom Audiences', platform: 'meta', cat: 'Targeting', def: 'Meta\'s audience type built from your own data sources: customer lists (CRM), website visitors (Pixel), app users, or engagement. Customer List Custom Audiences require 100+ matched users to activate. From September 2025, health/financial status data is blocked for CA targeting.' },
    { term: 'Customer Match', abbr: 'CM', platform: 'google', cat: 'Targeting', def: 'Google\'s feature for uploading hashed CRM data (email, phone, name, address) to target or suppress known customers. Requires $50K+ lifetime Google Ads spend. Google API-based upload was disabled April 1, 2026 — Data Manager is now mandatory. Minimum 1,000 matched users for Search/Shopping; 100 for YouTube/Display.' },
    { term: 'Data Manager', platform: 'google', cat: 'Data', def: 'Google\'s centralized data ingestion hub (launched December 9, 2025). The mandatory pipeline for Customer Match, Offline Conversion Import, and Enhanced Conversions. Replaces all legacy API-based upload methods. Supports scheduled connections for automated recurring uploads.' },
    { term: 'Deduplication', platform: 'both', cat: 'Tracking', def: 'The process of ensuring that a single conversion event is counted only once when reported by both browser (Pixel) and server (CAPI). Implemented via matching event_id parameters between Pixel and CAPI calls. Without deduplication, conversions are double-counted, inflating ROAS.' },
    { term: 'ECL', abbr: 'Enhanced Conversions for Leads', platform: 'google', cat: 'Tracking', def: 'Google\'s feature for lead-gen advertisers to match leads from Google Ads with CRM outcomes (SQL, closed-won). Sends hashed user data from lead forms back to Google. Improves Smart Bidding by providing downstream conversion quality signals. Requires Google tag or GTM implementation.' },
    { term: 'EMQ', abbr: 'Event Match Quality', platform: 'meta', cat: 'Tracking', def: 'Meta\'s score (0–10) measuring how reliably CAPI events can be matched to a Meta user. Score depends on how many identifiers (email, phone, name, address, fbclid, IP, user-agent) are sent. Target 7.5+ on all events; 8.8–9.3 for purchase. Scores above 8.5 have diminishing returns.' },
    { term: 'Enhanced Conversions', abbr: 'EC', platform: 'google', cat: 'Tracking', def: 'Google\'s feature that sends hashed first-party data (email, phone, name, address) from your thank-you page to improve conversion matching. Auto-upgraded by Google if not manually implemented by October 2025. Improves conversion reporting for users who block cookies or use cross-device journeys.' },
    { term: 'First-Party Data', abbr: 'FPD', platform: 'both', cat: 'Data', def: 'Data you collect directly from your own users through your owned properties (website, app, CRM, purchase history). The highest-quality signal for ad targeting: full control, no sharing, consent-based, and durable against regulatory and browser changes. The core of all modern audience strategies.' },
    { term: 'GA4', abbr: 'Google Analytics 4', platform: 'google', cat: 'Measurement', def: 'Google\'s current analytics platform (replaced Universal Analytics in July 2023). Enables Predictive Audiences (purchase probability, churn probability) publishable to Google Ads. Requires Google Signals enabled for cross-device tracking. Linked to Google Ads via Data Manager for audience publishing.' },
    { term: 'GDPR', abbr: 'General Data Protection Regulation', platform: 'both', cat: 'Privacy', def: 'EU regulation (effective 2018) requiring explicit informed consent before collecting personal data for advertising. In EEA, without Consent Mode v2 (Advanced), Google blocks data collection for non-consenting users. Non-compliance can result in fines up to 4% of global annual revenue.' },
    { term: 'Geo Holdout Test', platform: 'both', cat: 'Measurement', def: 'An incrementality test design that withholds advertising from a geographic region (holdout) while running normally in matched test regions. Compares KPIs between regions to isolate true incremental lift. More practical than user-level holdouts for campaigns with large reach.' },
    { term: 'Hashing', platform: 'both', cat: 'Privacy', def: 'One-way cryptographic transformation of PII (email, phone) into a fixed-length string (SHA-256) before uploading to ad platforms. Ad platforms compare hashes to match users without accessing raw data. Email must be lowercase; phone must be E.164 format (+14155552671). Wrong format = zero match for that field.' },
    { term: 'ITP', abbr: 'Intelligent Tracking Prevention', platform: 'both', cat: 'Privacy', def: 'Safari\'s browser mechanism (since iOS 11) that limits third-party cookie lifetime to 1–7 days and blocks cross-site tracking. Affects 25–35% of web users. Direct cause of attribution loss in browser-based tracking. Server-side CAPI/Enhanced Conversions bypass ITP.' },
    { term: 'Lookalike Audiences', abbr: 'LAL', platform: 'meta', cat: 'Targeting', def: 'Meta audiences built by finding users statistically similar to a seed audience (your customer list or pixel visitors). Quality depends heavily on seed size (1,000–50,000 is optimal range) and seed quality (use high-LTV customers as seed). Being replaced by Advantage+ Audience in most use cases.' },
    { term: 'Lookalike Segments', platform: 'google', cat: 'Targeting', def: 'Google\'s equivalent of Lookalike Audiences — available in Demand Gen campaigns only (not Search/PMax). Replaced Similar Audiences for Demand Gen after August 2023. Seeded from your Customer Match lists or pixel-based remarketing lists.' },
    { term: 'LTV', abbr: 'Lifetime Value', platform: 'both', cat: 'Bidding', def: 'The total predicted revenue from a customer across their lifetime. Used in Google Ads via Conversion Value Rules to multiply bid signals for high-LTV prospects, and in Meta via Conversion Leads to optimize toward downstream revenue quality rather than lead volume.' },
    { term: 'Match Rate', platform: 'both', cat: 'Data', def: 'The percentage of uploaded contacts that are successfully matched to users on the ad platform. Target 60%+ for Customer Match (Google) and Custom Audiences (Meta). Below 40% indicates CRM data quality issues. Improved by adding more fields (phone + name on top of email) and proper formatting.' },
    { term: 'MMM', abbr: 'Media Mix Modeling', platform: 'both', cat: 'Measurement', def: 'Statistical model estimating the contribution of each marketing channel to revenue using historical spend and conversion data. Platform-agnostic and privacy-safe. Used to allocate budgets across channels. First-party data enriches MMM by providing accurate conversion timestamps and values.' },
    { term: 'MOFU', abbr: 'Middle of Funnel', platform: 'both', cat: 'Strategy', def: 'The consideration stage of the customer journey. Audience strategies here include: re-engaging engaged website visitors, targeting MQLs with nurture content, and applying Custom Audience exclusions to avoid wasting acquisition budget on existing customers.' },
    { term: 'NCA', abbr: 'New Customer Acquisition', platform: 'google', cat: 'Campaigns', def: 'Google Ads campaign goal that optimizes for acquiring new customers only. Uses Customer Match "All Customers" list as the suppression signal to identify and exclude existing customers. Available in Shopping and Performance Max. Two modes: optimise (bid higher for new) or only (exclude existing entirely).' },
    { term: 'OCI', abbr: 'Offline Conversion Import', platform: 'google', cat: 'Tracking', def: 'Google\'s feature for importing offline conversion events (store visits, phone sales, CRM-closed deals) back to Google Ads. From September 2025, the conversion_environment parameter (web vs. in-app) is required. Ingested via Data Manager API since December 2025. Closes the loop between ad clicks and offline revenue.' },
    { term: 'OCAPI', abbr: 'Offline Conversions API', platform: 'meta', cat: 'Tracking', def: 'Meta\'s legacy offline conversion tracking system — fully deprecated May 2025. All offline conversion tracking must migrate to CAPI (Conversions API). Any existing OCAPI pipeline must be rebuilt using CAPI with event_type: "offline".' },
    { term: 'Optimized Targeting', platform: 'google', cat: 'Targeting', def: 'Google\'s automatic reach expansion for Display and Discovery campaigns. Finds additional users beyond your defined audience segments when it predicts they are likely to convert. Replaced Similar Audiences for these formats after August 2023.' },
    { term: 'Performance Max', abbr: 'PMax', platform: 'google', cat: 'Campaigns', def: 'Google\'s AI-driven campaign type running across all Google inventory (Search, Display, YouTube, Shopping, Maps, Gmail). Customer Match lists serve as audience signals — not hard targeting. Recommended: 1–2 high-quality signals only. No minimum list size required as of 2025.' },
    { term: 'Pixel', platform: 'meta', cat: 'Tracking', def: 'Meta\'s JavaScript tracking code (also called Meta Pixel or Facebook Pixel) installed on your website to track page views, events (ViewContent, AddToCart, Purchase), and user behaviour. Hybrid Pixel + CAPI is the 2025 standard. Pixel alone is degraded by ITP, browser ad blockers, and iOS ATT.' },
    { term: 'Predictive Audiences', platform: 'google', cat: 'Targeting', def: 'GA4-generated audiences based on ML purchase probability and churn probability scores. Threshold lowered to 200+ conversions (from 1,000+) in 2025. Studies show 34–42% higher CVR vs. manually-defined segments. Published to Google Ads via linked Data Manager.' },
    { term: 'RFM', abbr: 'Recency, Frequency, Monetary', platform: 'both', cat: 'Data', def: 'A customer segmentation model scoring customers on when they last purchased (Recency), how often they buy (Frequency), and how much they spend (Monetary). Used to build tiered CRM audiences: Champions (high R/F/M), Loyal, At-Risk, Hibernating, Lost — each requiring different ad strategies.' },
    { term: 'RLSA', abbr: 'Remarketing Lists for Search Ads', platform: 'google', cat: 'Targeting', def: 'Google Search campaign feature that adjusts bids or targeting based on whether a searcher is in a remarketing audience. Customer Match lists can be used as RLSA audiences. Bid modifier +30-50% is typical for existing customers searching brand terms.' },
    { term: 'ROAS', abbr: 'Return on Ad Spend', platform: 'both', cat: 'Measurement', def: 'Revenue divided by ad spend. Target ROAS (tROAS) is a Smart Bidding strategy in Google Ads. In Meta, ROAS is reported in Ads Manager. LTV-based strategies improve reported ROAS by ensuring higher-value customers are prioritised in the bidding process.' },
    { term: 'Second-Party Data', platform: 'both', cat: 'Data', def: 'Another company\'s first-party data shared directly through a data partnership (not via a broker). Quality varies; shared via data clean rooms or direct API integrations. Intermediate quality between first-party (highest trust) and third-party (lowest).' },
    { term: 'Segmentation', platform: 'both', cat: 'Data', def: 'Dividing a customer database into groups with shared characteristics (RFM tiers, product category, lifecycle stage, LTV bracket). Each segment gets a different ad strategy: high-LTV gets bid multipliers, at-risk gets win-back creative, new gets acquisition creative.' },
    { term: 'Server-Side Tracking', platform: 'both', cat: 'Tracking', def: 'Sending conversion and event data from your server directly to ad platforms, bypassing the browser. Bypasses ITP, ad blockers, and browser privacy restrictions. Implemented via Meta CAPI, Google OCI/ECL, or server-side tag containers (GTM server-side). The 2025 standard for reliable measurement.' },
    { term: 'SHA-256', platform: 'both', cat: 'Privacy', def: 'The cryptographic hash function required by Google and Meta for hashing PII before upload. Produces a 64-character hex string. Email: lowercase, no spaces. Phone: E.164 format (+14155552671). Name: lowercase, no accents. Both platforms accept pre-hashed data or hash on upload via their UIs.' },
    { term: 'Signal Loss', platform: 'both', cat: 'Measurement', def: 'The degradation of tracking and attribution data caused by privacy changes: iOS ATT, ITP, ETP, cookie deprecation, and consent regulations. 25–35% of iOS users and 40–60% of EU visitors may generate no traceable signal. First-party data strategies are the primary defence.' },
    { term: 'Smart Bidding', platform: 'google', cat: 'Bidding', def: 'Google\'s AI-driven bid strategies (tCPA, tROAS, Maximize Conversions, Maximize Conversion Value) that adjust bids in real-time per auction using hundreds of signals. Customer Match lists are a key input signal. Manual CPC and Enhanced CPC ignore first-party data entirely — migration to Smart Bidding is a prerequisite.' },
    { term: 'Suppression', platform: 'both', cat: 'Targeting', def: 'Excluding a known audience (e.g., existing customers) from seeing an ad campaign. Applied to prospecting campaigns to prevent wasting acquisition budget on people who already converted. Built from CRM "All Customers" list uploaded as Customer Match (Google) or Custom Audience (Meta).' },
    { term: 'tCPA', abbr: 'Target Cost Per Acquisition', platform: 'google', cat: 'Bidding', def: 'Google Smart Bidding strategy that optimizes bids to achieve a target cost-per-conversion. Requires sufficient conversion data (50+ conversions/month recommended). Uses Customer Match and audience signals to find similar users efficiently. Paired with LTV value rules for quality-adjusted targeting.' },
    { term: 'Third-Party Data', platform: 'both', cat: 'Data', def: 'Aggregated data from external data brokers — demographic overlays, interest segments, behavioural data sold across many buyers. Declining in quality and reliability due to cookie deprecation, GDPR/CCPA enforcement, and browser privacy changes. Not recommended as a primary targeting strategy in 2025+.' },
    { term: 'TOFU', abbr: 'Top of Funnel', platform: 'both', cat: 'Strategy', def: 'The awareness stage of the customer journey. First-party data is used here for Lookalike/Lookalike Segment prospecting (seeded from high-LTV customers), NCA goal campaigns (Google), and Advantage+ (Meta). The aim is to find new customers who resemble your best existing ones.' },
    { term: 'tROAS', abbr: 'Target Return on Ad Spend', platform: 'google', cat: 'Bidding', def: 'Google Smart Bidding strategy that optimizes bids to achieve a target revenue/spend ratio. Used for e-commerce when purchase value varies. Combined with LTV Conversion Value Rules to teach the algorithm to prioritise high-value customer acquisition over low-margin transactions.' },
    { term: 'Value-Based Bidding', abbr: 'VBB', platform: 'both', cat: 'Bidding', def: 'A bidding approach where the conversion value fed to the algorithm reflects true business value (LTV, margin, CLV) rather than a flat conversion count. In Google Ads: tROAS + Conversion Value Rules. In Meta: Value Optimisation with purchase value events. Requires reliable first-party value signals in your CRM.' },
    { term: 'Zero-Party Data', platform: 'both', cat: 'Data', def: 'Data that users voluntarily and explicitly share with a brand — quiz answers, preference centres, surveys, wishlist data. The highest-trust data type: explicitly consented, intentional, and highly accurate. Collected via on-site tools (preference centres, product quizzes) and stored in CRM.' },
  ].sort((a, b) => a.term.localeCompare(b.term));

  function renderGlossary(filterLetter = null, filterCat = null, searchQ = '') {
    renderSidebar(false);
    document.getElementById('content').classList.remove('narrow');

    const allCats = [...new Set(VOCAB.map(v => v.cat))].sort();
    const allLetters = [...new Set(VOCAB.map(v => v.term[0].toUpperCase()))].sort();

    const filtered = VOCAB.filter(v => {
      if (filterLetter && v.term[0].toUpperCase() !== filterLetter) return false;
      if (filterCat && v.cat !== filterCat) return false;
      if (searchQ) {
        const q = searchQ.toLowerCase();
        return v.term.toLowerCase().includes(q) || v.def.toLowerCase().includes(q);
      }
      return true;
    });

    // Group by letter
    const groups = {};
    filtered.forEach(v => {
      const l = v.term[0].toUpperCase();
      if (!groups[l]) groups[l] = [];
      groups[l].push(v);
    });

    const platBadge = p => p === 'google'
      ? '<span class="tag tag-google" style="font-size:9px;padding:1px 6px">Google</span>'
      : p === 'meta'
      ? '<span class="tag tag-meta" style="font-size:9px;padding:1px 6px">Meta</span>'
      : '<span class="tag tag-both" style="font-size:9px;padding:1px 6px">Both</span>';

    const hl = t => searchQ
      ? t.replace(new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>')
      : t;

    // Build nav
    let navHtml = `<div class="glossary-nav-title">A – Z</div><div class="glossary-alpha">`;
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
      const has = allLetters.includes(l);
      const active = filterLetter === l ? 'active' : '';
      navHtml += `<button class="glossary-alpha-btn ${active}" ${has ? '' : 'disabled'} onclick="FPD.goGlossary('${l}',null)">${l}</button>`;
    });
    navHtml += `</div>`;
    if (filterLetter || filterCat) {
      navHtml += `<div style="padding:4px 14px 8px"><button onclick="FPD.goGlossary(null,null)" style="font-size:11px;color:#7839EE;background:none;border:none;cursor:pointer;padding:0">✕ Clear filter</button></div>`;
    }
    navHtml += `<div class="glossary-cat-filter"><div class="glossary-cat-label">Category</div>`;
    allCats.forEach(c => {
      navHtml += `<button class="glossary-cat-btn ${filterCat === c ? 'active' : ''}" onclick="FPD.goGlossary(null,'${c}')">${c}</button>`;
    });
    navHtml += `</div>`;

    // Build content
    let contentHtml = '';
    if (!filtered.length) {
      contentHtml = `<div class="glossary-empty">No terms match your filter.</div>`;
    } else {
      Object.keys(groups).sort().forEach(l => {
        const cards = groups[l].map(v => `
          <div class="glossary-card">
            <div class="glossary-card-head">
              <span class="glossary-term">${hl(v.term)}</span>
              ${v.abbr ? `<span class="glossary-abbr">${v.abbr}</span>` : ''}
              ${platBadge(v.platform)}
              <span class="tag" style="background:rgba(0,0,0,0.04);color:rgb(100,100,100);font-size:9px;padding:1px 6px">${v.cat}</span>
            </div>
            <div class="glossary-def">${hl(v.def)}</div>
          </div>`).join('');
        contentHtml += `<div class="glossary-group" id="gl-${l}">
          <div class="glossary-letter">${l}</div>
          <div class="glossary-terms">${cards}</div>
        </div>`;
      });
    }

    document.getElementById('content').innerHTML = `
      <div class="page-title">Glossary</div>
      <div class="page-sub">${VOCAB.length} terms — professional vocabulary used throughout this guide.</div>
      <div class="glossary-layout">
        <nav class="glossary-nav">${navHtml}</nav>
        <div>${contentHtml}</div>
      </div>
    `;
    if (filterLetter) setTimeout(() => document.getElementById(`gl-${filterLetter}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
  }

  function goGlossary(letter, cat) {
    state.glossaryLetter = letter;
    state.glossaryCat = cat;
    renderGlossary(letter, cat);
  }

  function filterQR(modId) {
    state.qrSection = modId || null;
    // Update nav active state
    document.querySelectorAll('.cl-nav-item[data-qr-mod]').forEach(el => {
      const isAll = el.dataset.qrMod === '';
      el.classList.toggle('active', isAll ? !state.qrSection : el.dataset.qrMod === state.qrSection);
    });
    // Show/hide groups
    document.querySelectorAll('[data-qr-wrap]').forEach(el => {
      const group = el.querySelector('.qr-group[id]');
      if (!group) return;
      const groupId = group.id.replace('qrg-', '');
      el.style.display = (!state.qrSection || groupId === state.qrSection) ? '' : 'none';
    });
  }

  // Public API
  return { init, toggle, goModule, goTab, setFilter, resetAll, tipToggle, filterQR, searchNav, clearSearch, goGlossary };

})();

document.addEventListener('DOMContentLoaded', () => FPD.init());
</script>
</body>
